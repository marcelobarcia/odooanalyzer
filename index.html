<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odoo 18 Business Intelligence - Stock & Finance</title>

    <!-- Dependencias Core -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Prop-Types: Requerido por Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    
    <!-- Librerías de UI y Gráficos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .recharts-cartesian-grid-horizontal line,
        .recharts-cartesian-grid-vertical line { stroke: #f1f5f9; }
        input[type="date"] {
            border: 2px solid #e2e8f0;
            border-radius: 0.75rem;
            padding: 0.6rem;
            outline: none;
            font-weight: 700;
            color: #1e293b;
        }
        .glass-header {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid #e2e8f0;
        }
        .card-grad {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border: 1px solid #e2e8f0;
        }
        .tab-content { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="odoo-bi-app-root"></div>

    <script type="text/babel">
    (function() {
        const { useState, useMemo } = React;

        const icons = {
            Package:     "M16.5 9.4l-9-5.19M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12",
            TrendingUp:  "M23 6l-9.5 9.5-5-5L1 18 M17 6h6v6",
            Activity:    "M22 12h-4l-3 9L9 3l-3 9H2",
            ShoppingCart:"M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4zM3 6h18M16 10a4 4 0 01-8 0",
            ArrowRight:  "M5 12h14M12 5l7 7-7 7",
            XCircle:     "M22 12A10 10 0 1112 2a10 10 0 0110 10zM15 9l-6 6M9 9l6 6",
            Calendar:    "M3 4h18v18H3zM16 2v4M8 2v4M3 10h18",
            Truck:       "M1 3h15v13H1zM16 8h4l3 3v5h-7V8zM5.5 21a2.5 2.5 0 100-5 2.5 2.5 0 000 5zM18.5 21a2.5 2.5 0 100-5 2.5 2.5 0 000 5z",
            Download:    "M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4 M7 10l5 5 5-5 M12 15V3",
            FileText:    "M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z M14 2v6h6 M16 13H8M16 17H8M10 9H8",
            Box:         "M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z",
            BarChart:    "M18 20V10M12 20V4M6 20v-6"
        };
        const Ico = ({ name, size = 24, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
                stroke="currentColor" strokeWidth="2" strokeLinecap="round"
                strokeLinejoin="round" className={className}>
                <path d={icons[name] || ""} />
            </svg>
        );

        const IVA = 1.19;
        const fmt = v => Math.round(v || 0).toLocaleString('es-CL');

        const cleanNum = v => {
            if (v === undefined || v === null || v === "") return 0;
            if (typeof v === 'number') return isFinite(v) ? v : 0;
            let s = String(v).replace(/[$\s'"]/g, "").trim();
            const neg = s.startsWith('-');
            if (neg) s = s.slice(1);
            if (s.includes('.') && s.includes(',')) s = s.replace(/\./g,'').replace(',','.');
            else if (s.includes(',')) s = s.replace(',','.');
            else if (s.includes('.')) {
                const parts = s.split('.');
                if (parts.length > 2 || parts[parts.length-1].length === 3) s = s.replace(/\./g,'');
            }
            const n = parseFloat(s);
            return isFinite(n) ? (neg ? -n : n) : 0;
        };

        const parseDate = d => {
            if (!d) return null;
            if (d instanceof Date && !isNaN(d)) return new Date(d.getFullYear(), d.getMonth(), d.getDate());
            if (typeof d === 'number') {
                const date = new Date((d - 25569) * 86400 * 1000);
                return new Date(date.getFullYear(), date.getMonth(), date.getDate());
            }
            const str = String(d).toLowerCase().trim();
            const isoMatch = str.match(/^(\d{4})-(\d{2})-(\d{2})/);
            if (isoMatch) return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]));
            const latMatch = str.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})/);
            if (latMatch) return new Date(parseInt(latMatch[3]), parseInt(latMatch[2]) - 1, parseInt(latMatch[1]));
            const MS = {ene:0,feb:1,mar:2,abr:3,may:4,jun:5,jul:6,ago:7,sep:8,oct:9,nov:10,dic:11,jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
            const p = str.split(/\s+/);
            if (p.length >= 3) {
                const day = parseInt(p[0]);
                const mon = MS[p[1].substring(0,3)];
                const year = parseInt(p[2]);
                if (!isNaN(day) && mon !== undefined && !isNaN(year)) return new Date(year, mon, day);
            }
            return null;
        };

        const dk = d => d ? `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}` : '';
        const norm = n => n ? n.toString().toLowerCase().replace(/^\.+/,'').trim().replace(/[^a-z0-9]/g,'') : '';

        const BusinessApp = () => {
            const [posData,       setPosData]       = useState([]);
            const [valuationData, setValuationData] = useState([]);
            const [ordersData,    setOrdersData]    = useState([]);
            const [stockRealData, setStockRealData] = useState({});
            const [fixedCosts,    setFixedCosts]    = useState(400000);
            const [dailyGoal,     setDailyGoal]     = useState(150000);
            const [coverageDays,  setCoverageDays]  = useState(10);
            const [activeTab,     setActiveTab]     = useState('import');
            const [fileStatus,    setFileStatus]    = useState({ pos: 'idle', val: 'idle', ord: 'idle', stk: 'idle' });
            const [fileNames,     setFileNames]     = useState({ pos: '', val: '', ord: '', stk: '' });
            const [errorMsg,      setErrorMsg]      = useState('');
            const [dateRange,     setDateRange]     = useState({ from: '', to: '' });
            const [logisticsFilter, setLogisticsFilter] = useState('ALL');

            const RC = window.Recharts;

            const onUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                setErrorMsg('');
                setFileStatus(p => ({ ...p, [type]: 'loading' }));
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const data = new Uint8Array(ev.target.result);
                        const wb = XLSX.read(data, { type:'array', cellDates: true });
                        let raw = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header:1, defval:'' });
                        
                        raw = raw.map(row => {
                            if (row.length === 1 && String(row[0]).includes(',')) return row[0].split(',');
                            return row;
                        });

                        if (type === 'pos') {
                            const hIdx = raw.findIndex(r => r.some(c => String(c).toLowerCase().includes('precio total')));
                            if (hIdx === -1) throw new Error("No se halló la columna 'Precio total'.");
                            const heads = raw[hIdx].map(h => String(h).toLowerCase().trim());
                            const qtyIdx = heads.findIndex(h => h.includes('cantidad'));
                            const prcIdx = heads.findIndex(h => h.includes('precio total'));
                            let curD = null, items = [], maxD = null;
                            raw.slice(hIdx + 1).forEach(r => {
                                const cellStr = String(r[0] || '').trim();
                                const possibleDate = parseDate(cellStr);
                                if (possibleDate && !cellStr.toLowerCase().includes('total')) {
                                    curD = possibleDate;
                                    if (!maxD || curD > maxD) maxD = new Date(curD.getTime());
                                } else if (cellStr && curD && cellStr.toLowerCase() !== 'total') {
                                    const gr = cleanNum(r[prcIdx]);
                                    items.push({ fecha: new Date(curD.getTime()), p: cellStr, q: cleanNum(r[qtyIdx]), gr, nt: gr / IVA });
                                }
                            });
                            setPosData(items);
                            if (maxD) {
                                const s = new Date(maxD.getTime());
                                s.setDate(s.getDate() - 6);
                                setDateRange({ from: dk(s), to: dk(maxD) });
                            }
                        } else if (type === 'val') {
                            const hIdx = raw.findIndex(r => r.some(c => String(c).toLowerCase().includes('valor total')));
                            const heads = raw[hIdx].map(h => String(h).toLowerCase().trim());
                            const dateIdx = heads.findIndex(h => h.includes('fecha') || h.includes('creado'));
                            const prodIdx = heads.findIndex(h => h.includes('producto'));
                            const valIdx  = heads.findIndex(h => h.includes('valor total'));
                            const qtyOIdx = heads.findIndex(h => h.includes('cantidad'));
                            const items = raw.slice(hIdx + 1).map(r => {
                                const dVal = parseDate(r[dateIdx]);
                                if (!dVal || !r[prodIdx]) return null;
                                return { fecha: dVal, p: String(r[prodIdx]).trim(), v: cleanNum(r[valIdx]), qo: cleanNum(r[qtyOIdx]) };
                            }).filter(i => i !== null);
                            setValuationData(items);
                        } else if (type === 'ord') {
                            const hIdx = raw.findIndex(r => r.some(c => String(c).toLowerCase().includes('cantidad producto')));
                            if (hIdx === -1) throw new Error("No se halló la cabecera en el archivo de pedidos.");
                            const heads = raw[hIdx].map(h => String(h).toLowerCase().trim());
                            const pedIdx = heads.findIndex(h => h.includes('pedido'));
                            const canIdx = heads.findIndex(h => h.includes('cantidad producto'));
                            
                            let dailySummary = [];
                            raw.slice(hIdx + 1).forEach(r => {
                                const cellStr = String(r[0] || '').trim();
                                const d = parseDate(cellStr);
                                if (d && !cellStr.toLowerCase().includes('total')) {
                                    dailySummary.push({ fecha: d, pedidos: cleanNum(r[pedIdx]), articulos: cleanNum(r[canIdx]) });
                                }
                            });
                            setOrdersData(dailySummary);
                        } else if (type === 'stk') {
                            const heads = raw[0].map(h => String(h).toLowerCase().trim());
                            const nameIdx = heads.findIndex(h => h.includes('nombre') || h.includes('producto'));
                            const stockIdx = heads.findIndex(h => h.includes('mano') || h.includes('disponible'));
                            
                            const mapping = {};
                            raw.slice(1).forEach(r => {
                                if (r[nameIdx]) mapping[norm(r[nameIdx])] = cleanNum(r[stockIdx]);
                            });
                            setStockRealData(mapping);
                        }
                        setFileStatus(p => ({ ...p, [type]: 'success' }));
                        setFileNames(p => ({ ...p, [type]: file.name }));
                    } catch (err) {
                        setErrorMsg(err.message);
                        setFileStatus(p => ({ ...p, [type]: 'error' }));
                    }
                };
                reader.readAsArrayBuffer(file);
            };

            const report = useMemo(() => {
                if (!dateRange.from || !dateRange.to || posData.length === 0) return null;
                const fromK = dateRange.from, toK = dateRange.to;
                const [fy,fm,fd] = fromK.split('-').map(Number), [ty,tm,td] = toK.split('-').map(Number);
                const startDate = new Date(fy, fm-1, fd), endDate = new Date(ty, tm-1, td);
                const daysCount = Math.max(1, Math.round((endDate - startDate) / 86400000) + 1);

                const prevStart = new Date(fy, fm-1, fd - daysCount);
                const prevEnd = new Date(fy, fm-1, fd - 1);

                const filt = (l, fk, tk) => l.filter(d => { const k = dk(d.fecha); return k >= fk && k <= tk; });
                
                const curS = filt(posData, fromK, toK);
                const prevS = filt(posData, dk(prevStart), dk(prevEnd));
                const curV = filt(valuationData, fromK, toK);
                const curO = filt(ordersData, fromK, toK);

                const ordersMap = {};
                curO.forEach(o => {
                    const key = dk(o.fecha);
                    if (!ordersMap[key]) ordersMap[key] = { p: 0, a: 0 };
                    ordersMap[key].p += o.pedidos;
                    ordersMap[key].a += o.articulos;
                });

                const invMap = {};
                curS.forEach(s => {
                    const k = norm(s.p);
                    if (!invMap[k]) invMap[k] = { n: s.p, pq:0, vq:0, nr:0, c:0 };
                    invMap[k].pq += s.q;
                    invMap[k].nr += s.nt;
                });
                curV.forEach(c => {
                    const k = norm(c.p);
                    if (!invMap[k]) invMap[k] = { n: c.p, pq:0, vq:0, nr:0, c:0 };
                    if (c.v < 0) { invMap[k].vq += Math.abs(c.qo); invMap[k].c += Math.abs(c.v); }
                });

                const purchasePlan = Object.values(invMap).map(i => {
                    const out = Math.max(i.pq, i.vq);
                    const avg = out / daysCount;
                    const sk = avg * Number(coverageDays);
                    const stockActual = stockRealData[norm(i.n)] || 0;
                    let status = 'OK';
                    if (stockActual <= 0) status = 'CRITICO';
                    else if (stockActual < sk) status = 'COMPRAR';
                    return { ...i, out, avg, sk, margin: i.nr > 0 ? (i.nr-i.c)/i.nr : 0, stockActual, status, deficit: Math.max(0, sk - stockActual) };
                }).filter(p => p.out > 0).sort((a,b) => b.out - a.out);

                const wNames = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
                let totalOrders = 0; 
                const dStats = []; 
                let it = new Date(startDate.getTime());
                
                while (dk(it) <= toK) {
                    const dki = dk(it);
                    const net = curS.filter(s => dk(s.fecha) === dki).reduce((a,b) => a + b.nt, 0);
                    const daysOffset = Math.round((it - startDate) / 86400000);
                    const pDate = new Date(prevStart.getFullYear(), prevStart.getMonth(), prevStart.getDate() + daysOffset);
                    const pNet = prevS.filter(s => dk(s.fecha) === dk(pDate)).reduce((a,b) => a + b.nt, 0);
                    const ordDay = ordersMap[dki] || { p: 0, a: 0 };
                    totalOrders += ordDay.p;

                    dStats.push({ 
                        label: `${wNames[it.getDay()]} ${it.getDate()}/${it.getMonth()+1}`, 
                        Actual: Math.round(net), 
                        Anterior: Math.round(pNet),
                        Meta: Number(dailyGoal), 
                        pedidos: ordDay.p,
                        ticket: ordDay.p > 0 ? Math.round(net / ordDay.p) : 0
                    });
                    it.setDate(it.getDate() + 1);
                }

                const tNet = Math.round(curS.reduce((a,b) => a + b.nt, 0));
                const tCst = Math.round(Object.values(invMap).reduce((a,b) => a + b.c, 0));
                const gM = tNet - tCst;
                
                return { tNet, tCst, totalOrders, gM, nM: gM - Number(fixedCosts), be: (gM/tNet) > 0 ? Number(fixedCosts) / (gM/tNet) : 0, at: totalOrders > 0 ? Math.round(tNet / totalOrders) : 0, dStats, purchasePlan, daysCount, pct: tNet > 0 ? gM/tNet : 0 };
            }, [posData, valuationData, ordersData, stockRealData, dateRange, fixedCosts, dailyGoal, coverageDays]);

            const filteredLogistics = useMemo(() => {
                if (!report) return [];
                return logisticsFilter === 'ALL' ? report.purchasePlan : report.purchasePlan.filter(p => p.status === logisticsFilter);
            }, [report, logisticsFilter]);

            return (
                <div className="min-h-screen pb-20">
                    <header className="max-w-7xl mx-auto py-6 px-6 flex flex-col md:flex-row items-center justify-between glass-header sticky top-0 z-50 rounded-b-3xl shadow-sm mb-10">
                        <div className="flex items-center gap-4">
                            <div className="bg-emerald-600 p-3 rounded-2xl shadow-lg text-white"><Ico name="Package" size={32} /></div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 uppercase italic tracking-tighter">Odoo Analyzer PRO</h1>
                                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">Enterprise Analytics v2.6</p>
                            </div>
                        </div>
                        <nav className="flex bg-slate-100 p-1.5 rounded-2xl mt-4 md:mt-0 gap-1">
                            {['import', 'dashboard', 'procurement'].map(id => (
                                <button key={id} onClick={() => setActiveTab(id)}
                                    className={`px-6 py-2 rounded-xl text-xs font-black uppercase transition-all ${activeTab === id ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {id === 'import' ? 'Configurar' : id === 'dashboard' ? 'Finanzas' : 'Logística'}
                                </button>
                            ))}
                        </nav>
                    </header>

                    <main className="max-w-7xl mx-auto px-6">
                        {errorMsg && (
                            <div className="bg-red-50 border-2 border-red-200 text-red-600 p-5 rounded-3xl mb-8 flex items-center gap-4 font-bold animate-pulse">
                                <Ico name="XCircle" /> {errorMsg}
                            </div>
                        )}

                        {activeTab === 'import' && (
                            <div className="tab-content space-y-8">
                                <div className="grid lg:grid-cols-4 gap-6 text-center">
                                    {['pos','val','ord','stk'].map(type => (
                                        <label key={type} className={`card-grad p-8 rounded-[2.5rem] border-4 border-dashed transition-all cursor-pointer block ${fileStatus[type] === 'success' ? 'border-emerald-500 bg-emerald-50' : 'border-slate-200 hover:border-emerald-400'}`}>
                                            <input type="file" onChange={e => onUpload(e, type)} className="hidden" accept=".xlsx,.xls,.csv" />
                                            <div className={`flex justify-center mb-4 ${type === 'pos' ? 'text-emerald-600' : type === 'val' ? 'text-blue-600' : type === 'ord' ? 'text-orange-600' : 'text-indigo-600'}`}>
                                                <Ico name={type === 'pos' ? 'ShoppingCart' : type === 'val' ? 'Activity' : type === 'ord' ? 'FileText' : 'Box'} size={32} />
                                            </div>
                                            <h3 className="text-sm font-black uppercase">{type.toUpperCase()}</h3>
                                            <p className="text-slate-400 text-[10px] mt-2 italic truncate">{fileNames[type] || 'Haz clic para subir'}</p>
                                        </label>
                                    ))}
                                </div>
                                
                                <div className="grid md:grid-cols-3 gap-6">
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white border-b-8 border-emerald-600 shadow-xl">
                                        <p className="text-[10px] font-black uppercase text-emerald-400 mb-2">Gastos Fijos Mensuales</p>
                                        <input type="number" value={fixedCosts} onChange={e => setFixedCosts(e.target.value)} className="bg-transparent text-2xl font-black outline-none w-full border-b border-slate-700" />
                                    </div>
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white border-b-8 border-blue-600 shadow-xl">
                                        <p className="text-[10px] font-black uppercase text-blue-400 mb-2">Meta Venta Diaria</p>
                                        <input type="number" value={dailyGoal} onChange={e => setDailyGoal(e.target.value)} className="bg-transparent text-2xl font-black outline-none w-full border-b border-slate-700" />
                                    </div>
                                    <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white border-b-8 border-orange-600 shadow-xl">
                                        <p className="text-[10px] font-black uppercase text-orange-400 mb-2">Días Stock Seguridad</p>
                                        <input type="number" value={coverageDays} onChange={e => setCoverageDays(e.target.value)} className="bg-transparent text-2xl font-black outline-none w-full border-b border-slate-700" />
                                    </div>
                                </div>
                                {posData.length > 0 && (
                                    <button onClick={() => setActiveTab('dashboard')} className="w-full bg-emerald-600 text-white py-6 rounded-3xl font-black text-xl shadow-2xl flex items-center justify-center gap-4 hover:bg-emerald-700 transition-all uppercase">
                                        GENERAR REPORTES <Ico name="ArrowRight" size={28} />
                                    </button>
                                )}
                            </div>
                        )}

                        {activeTab === 'dashboard' && report && (
                            <div className="tab-content space-y-8">
                                <div className="grid lg:grid-cols-3 gap-6">
                                    <div className="lg:col-span-2 bg-white p-8 rounded-[2.5rem] border shadow-sm flex items-center gap-8">
                                        <div className="bg-blue-600 p-4 rounded-3xl text-white shadow-lg"><Ico name="Calendar" size={28} /></div>
                                        <div className="flex-1 grid grid-cols-2 gap-4">
                                            <div>
                                                <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Desde</label>
                                                <input type="date" value={dateRange.from} onChange={e => setDateRange(p => ({...p, from: e.target.value}))} className="w-full" />
                                            </div>
                                            <div>
                                                <label className="text-[10px] font-black uppercase text-slate-400 block mb-1">Hasta</label>
                                                <input type="date" value={dateRange.to} onChange={e => setDateRange(p => ({...p, to: e.target.value}))} className="w-full" />
                                            </div>
                                        </div>
                                    </div>
                                    <div className="bg-slate-800 p-8 rounded-[2.5rem] text-white flex items-center justify-between border-b-8 border-emerald-500 shadow-xl">
                                        <div>
                                            <p className="text-[10px] font-black text-slate-400 uppercase mb-1">Margen Real</p>
                                            <p className="text-4xl font-black text-emerald-400 italic">{(report.pct * 100).toFixed(1)}%</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-6 gap-4 font-black">
                                    <div className="bg-white p-6 rounded-3xl border border-b-8 border-b-blue-600 shadow-sm"><p className="text-[10px] text-slate-400 mb-1">Venta Neta</p><h2 className="text-xl">${fmt(report.tNet)}</h2></div>
                                    <div className="bg-white p-6 rounded-3xl border border-b-8 border-b-rose-500 shadow-sm"><p className="text-[10px] text-slate-400 mb-1">Costo Vta</p><h2 className="text-xl text-rose-600">${fmt(report.tCst)}</h2></div>
                                    <div className="bg-blue-600 p-6 rounded-3xl text-white shadow-lg border-b-8 border-blue-800"><p className="text-[10px] text-blue-200 mb-1 uppercase">Utilidad Bruta</p><h2 className="text-xl italic">${fmt(report.gM)}</h2></div>
                                    <div className={`p-6 rounded-3xl text-white shadow-lg border-b-8 ${report.nM > 0 ? 'bg-emerald-700 border-emerald-900' : 'bg-rose-700 border-rose-900'}`}><p className="text-[10px] text-white/70 mb-1 uppercase">Utilidad Neta</p><h2 className="text-xl italic">${fmt(report.nM)}</h2></div>
                                    <div className="bg-white p-6 rounded-3xl border border-b-8 border-b-indigo-600 shadow-sm text-indigo-600"><p className="text-[10px] text-slate-400 mb-1">Ticket Prom.</p><h2 className="text-xl">${fmt(report.at)}</h2></div>
                                    <div className="bg-white p-6 rounded-3xl border border-b-8 border-b-orange-600 shadow-sm text-orange-600"><p className="text-[10px] text-slate-400 mb-1">Pedidos</p><h2 className="text-xl">{report.totalOrders}</h2></div>
                                </div>

                                <div className="grid lg:grid-cols-2 gap-8">
                                    <div className="bg-white p-10 rounded-[3rem] border shadow-sm">
                                        <h3 className="text-xl font-black mb-8 italic uppercase flex items-center gap-3">
                                            <Ico name="TrendingUp" className="text-blue-600" /> Rendimiento de Ventas
                                        </h3>
                                        <div style={{height:300}}>
                                            <RC.ResponsiveContainer width="100%" height="100%">
                                                <RC.ComposedChart data={report.dStats}>
                                                    <RC.CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                    <RC.XAxis dataKey="label" fontSize={10} axisLine={false} tickLine={false} />
                                                    <RC.YAxis fontSize={12} axisLine={false} tickLine={false} tickFormatter={v => `$${(v/1000).toFixed(0)}k`} />
                                                    <RC.Tooltip contentStyle={{borderRadius:'24px', border:'none', boxShadow:'0 10px 30px rgba(0,0,0,0.1)'}} />
                                                    <RC.Legend verticalAlign="top" height={36}/>
                                                    <RC.Bar dataKey="Actual" name="Venta Actual" fill="#2563eb" radius={[6,6,0,0]} barSize={25} />
                                                    <RC.Line type="monotone" dataKey="Anterior" name="Semana Anterior" stroke="#cbd5e1" strokeWidth={2} dot={false} strokeDasharray="4 4" />
                                                    <RC.Line type="monotone" dataKey="Meta" name="Meta" stroke="#f43f5e" strokeWidth={3} strokeDasharray="8 8" dot={false} />
                                                </RC.ComposedChart>
                                            </RC.ResponsiveContainer>
                                        </div>
                                    </div>

                                    <div className="bg-white p-10 rounded-[3rem] border shadow-sm">
                                        <h3 className="text-xl font-black mb-8 italic uppercase flex items-center gap-3">
                                            <Ico name="BarChart" className="text-indigo-600" /> Pedidos y Eficiencia
                                        </h3>
                                        <div style={{height:300}}>
                                            <RC.ResponsiveContainer width="100%" height="100%">
                                                <RC.ComposedChart data={report.dStats}>
                                                    <RC.CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                    <RC.XAxis dataKey="label" fontSize={10} axisLine={false} tickLine={false} />
                                                    <RC.YAxis yAxisId="left" fontSize={12} axisLine={false} tickLine={false} />
                                                    <RC.YAxis yAxisId="right" orientation="right" fontSize={12} axisLine={false} tickLine={false} tickFormatter={v => `$${(v/1000).toFixed(0)}k`} />
                                                    <RC.Tooltip contentStyle={{borderRadius:'24px'}} />
                                                    <RC.Legend verticalAlign="top" height={36}/>
                                                    <RC.Bar yAxisId="left" dataKey="pedidos" name="N° Pedidos" fill="#6366f1" radius={[6,6,0,0]} barSize={20} />
                                                    <RC.Line yAxisId="right" type="stepAfter" dataKey="ticket" name="Ticket Promedio" stroke="#f59e0b" strokeWidth={3} dot={{ r: 4, fill:'#f59e0b' }} />
                                                </RC.ComposedChart>
                                            </RC.ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'procurement' && report && (
                            <div className="tab-content space-y-8">
                                <div className="bg-blue-600 p-10 rounded-[3rem] text-white flex flex-col md:flex-row items-center justify-between shadow-xl gap-6">
                                    <div className="flex items-center gap-6">
                                        <div className="bg-blue-800 p-5 rounded-3xl"><Ico name="Truck" size={48} /></div>
                                        <div>
                                            <h2 className="text-3xl font-black italic uppercase tracking-tighter">Plan de Abastecimiento</h2>
                                            <p className="opacity-80">Cobertura: <strong>{coverageDays} días</strong>.</p>
                                        </div>
                                    </div>
                                    <div className="flex bg-blue-700 p-2 rounded-2xl gap-1">
                                        {['ALL', 'COMPRAR', 'CRITICO', 'OK'].map(f => (
                                            <button key={f} onClick={() => setLogisticsFilter(f)} 
                                                className={`px-4 py-2 rounded-xl text-[10px] font-black transition-all ${logisticsFilter === f ? 'bg-white text-blue-600' : 'text-blue-100 hover:bg-blue-600'}`}>
                                                {f === 'ALL' ? 'TODO' : f}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="bg-white rounded-[3.5rem] shadow-sm overflow-hidden border">
                                    <table className="w-full text-left">
                                        <thead className="bg-slate-50 text-[10px] font-black uppercase text-slate-400 border-b">
                                            <tr>
                                                <th className="px-8 py-6">Producto</th>
                                                <th className="text-right px-6 py-6">Stock Actual</th>
                                                <th className="text-right px-6 py-6">Sugerido</th>
                                                <th className="text-right px-6 py-6 text-blue-600 font-black italic">A Comprar</th>
                                                <th className="text-center px-8 py-6">Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y font-bold">
                                            {filteredLogistics.map((p, idx) => (
                                                <tr key={idx} className="hover:bg-slate-50">
                                                    <td className="px-8 py-5 font-black text-slate-800 text-sm">{p.n}</td>
                                                    <td className="px-6 py-5 text-right font-black">{p.stockActual.toFixed(1)}</td>
                                                    <td className="px-6 py-5 text-right text-slate-400">{p.sk.toFixed(1)}</td>
                                                    <td className="px-6 py-5 text-right text-2xl text-blue-600 italic">{p.deficit > 0 ? p.deficit.toFixed(1) : '-'}</td>
                                                    <td className="px-8 py-5 text-center">
                                                        <span className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase ${
                                                            p.status === 'CRITICO' ? 'bg-rose-100 text-rose-600' :
                                                            p.status === 'COMPRAR' ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600'
                                                        }`}> {p.status} </span>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    <footer className="max-w-7xl mx-auto mt-24 py-12 border-t text-center opacity-30 italic font-black text-[10px] uppercase tracking-[0.5em]">
                        Odoo Strategic BI · v2.6 Final Analysis
                    </footer>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('odoo-bi-app-root')).render(<BusinessApp />);
    })();
    </script>
</body>
</html>
